<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="SuccessBridge - Comprehensive learning platform for high school and university students"
    />
    <meta name="theme-color" content="#3b82f6" />

    <!-- Note: Security headers (CSP, X-Frame-Options, X-Content-Type-Options, X-XSS-Protection) 
         are now set via HTTP headers from the server (see Server/src/index.ts).
         Meta tags for frame-ancestors and X-Frame-Options are ignored by browsers and cause warnings. -->

    <!-- Referrer Policy -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- Permissions Policy -->
    <meta
      http-equiv="Permissions-Policy"
      content="
      geolocation=(),
      microphone=(),
      camera=(),
      payment=(),
      usb=(),
      magnetometer=(),
      gyroscope=(),
      accelerometer=()
    "
    />

    <title>SuccessBridge - Learning Platform</title>
    <script>
      // Set API URL based on environment
      // For production (Cloudflare Pages), use the Render API
      // For local network access (192.168.x.x), use the local server
      // For localhost/127.0.0.1, use .env file
      const hostname = window.location.hostname;

      if (hostname !== "localhost" && hostname !== "127.0.0.1") {
        // Check if it's a local network IP (192.168.x.x or 10.x.x.x)
        if (
          hostname.startsWith("192.168.") ||
          hostname.startsWith("10.") ||
          hostname.startsWith("172.")
        ) {
          // Use local network API server (adjust port as needed)
          window.__VITE_API_URL__ = "http://192.168.0.114:5000/api";
        } else {
          // Production - use Render API
          window.__VITE_API_URL__ =
            "https://successbridge-tolesa-api.onrender.com/api";
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
